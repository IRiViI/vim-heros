[code]
content = """
# Vim tip: cw deletes a word and enters insert mode
def process_data(raw_input):
    cleaned = raw_input.strip()
    tokens = cleaned.split(",")
    result = []
    for token in tokens:
        value = int(token.strip())
        result.append(value)
    return result


def greet_user(nme):
    message = f"Hello, {nme}!"
    print(message)
    return message
"""

