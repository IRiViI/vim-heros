[code]
content = """
class ValidationError(Exception):
    \"\"\"Raised when input validation fails.\"\"\"

    def __init__(self, field, message, value=None):
        self.field = field
        self.message = message
        self.value = value
        super().__init__(f"{field}: {message}")


class NotFoundError(Exception):
    \"\"\"Raised when a resource is not found.\"\"\"
    pass


class UserRepository:
    def __init__(self):
        self.users = {}

    def add_user(self, username, email):
        if not username or len(username) < 3:
            raise ValidationError("username", "Must be at least 3 chars", username)
        if "@" not in email:
            raise ValidationError("email", "Invalid format", email)
        if username in self.users:
            raise ValidationError("username", "Already exists", username)
        self.users[username] = {"email": email, "active": True}

    def get_user(self, username):
        try:
            return self.users[username]
        except KeyError:
            raise NotFoundError(f"User '{username}' not found") from None

    def deactivate_user(self, username):
        user = self.get_user(username)
        user["active"] = False
        return user
"""

