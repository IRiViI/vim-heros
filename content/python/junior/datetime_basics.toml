content = """
from datetime import datetime, timedelta, date


def days_until_birthday(birth_month, birth_day):
    \"\"\"Calculate days until next birthday.\"\"\"
    today = date.today()
    birthday = date(today.year, birth_month, birth_day)
    if birthday < today:
        birthday = date(today.year + 1, birth_month, birth_day)
    delta = birthday - today
    return delta.days


def parse_timestamps(raw_dates):
    \"\"\"Parse various date format strings into datetime objects.\"\"\"
    formats = [
        "%Y-%m-%d",
        "%d/%m/%Y",
        "%B %d, %Y",
        "%Y-%m-%dT%H:%M:%S",
    ]
    parsed = []
    for raw in raw_dates:
        for fmt in formats:
            try:
                parsed.append(datetime.strptime(raw, fmt))
                break
            except ValueError:
                continue
    return parsed


def generate_date_range(start_date, end_date):
    \"\"\"Generate all dates between start and end (inclusive).\"\"\"
    current = start_date
    dates = []
    while current <= end_date:
        dates.append(current)
        current += timedelta(days=1)
    return dates


def working_days_between(start, end):
    \"\"\"Count working days (Mon-Fri) between two dates.\"\"\"
    count = 0
    current = start
    while current <= end:
        if current.weekday() < 5:
            count += 1
        current += timedelta(days=1)
    return count
"""

