[meta]
id = "py-junior-list-comp-complex"
zone = "junior"
language = "python"
tags = ["comprehensions", "nested", "filtering"]
difficulty = 3

[code]
content = """
students = [
    {"name": "Alice", "grades": [88, 92, 79, 95]},
    {"name": "Bob", "grades": [72, 68, 81, 77]},
    {"name": "Carol", "grades": [95, 98, 92, 97]},
    {"name": "Dave", "grades": [61, 55, 70, 63]},
]

# Average grade per student
averages = [
    {"name": s["name"], "avg": sum(s["grades"]) / len(s["grades"])}
    for s in students
]

# Flatten all grades into one list
all_grades = [g for s in students for g in s["grades"]]

# Students with averages above 80
honor_roll = [
    s["name"]
    for s in students
    if sum(s["grades"]) / len(s["grades"]) > 80
]

# Nested: matrix transposition
matrix = [[1, 2, 3], [4, 5, 6], [7, 8, 9]]
transposed = [[row[i] for row in matrix] for i in range(len(matrix[0]))]

# Filtered pairs from two lists
evens = [2, 4, 6]
odds = [1, 3, 5]
pairs = [(e, o) for e in evens for o in odds if (e + o) % 3 == 0]
"""

[[tasks]]
type = "move_to"
anchor = { pattern = "averages", occurrence = 1 }
description = "Move to 'averages'"
points = 75
optimal_keys = 4

[[tasks]]
type = "move_to"
anchor = { pattern = "honor_roll", occurrence = 1 }
description = "Move to 'honor_roll'"
points = 100
optimal_keys = 5

[[tasks]]
type = "move_to"
anchor = { pattern = "transposed", occurrence = 1 }
description = "Move to 'transposed'"
points = 100
optimal_keys = 6
