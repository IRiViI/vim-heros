content = """
def binary_search(sorted_list, target):
    \"\"\"Find target in a sorted list, return index or -1.\"\"\"
    left = 0
    right = len(sorted_list) - 1

    while left <= right:
        mid = (left + right) // 2
        current = sorted_list[mid]

        if current == target:
            return mid
        elif current < target:
            left = mid + 1
        else:
            right = mid - 1

    return -1


def binary_search_recursive(arr, target, left=0, right=None):
    \"\"\"Recursive version of binary search.\"\"\"
    if right is None:
        right = len(arr) - 1
    if left > right:
        return -1
    mid = (left + right) // 2
    if arr[mid] == target:
        return mid
    elif arr[mid] < target:
        return binary_search_recursive(arr, target, mid + 1, right)
    else:
        return binary_search_recursive(arr, target, left, mid - 1)


def find_insertion_point(sorted_list, value):
    \"\"\"Find where to insert value to keep list sorted.\"\"\"
    left = 0
    right = len(sorted_list)
    while left < right:
        mid = (left + right) // 2
        if sorted_list[mid] < value:
            left = mid + 1
        else:
            right = mid
    return left


data = list(range(0, 100, 3))
index = binary_search(data, 42)
insert_at = find_insertion_point(data, 50)
"""

