[meta]
id = "py-junior-dict-comprehensions"
zone = "junior"
language = "python"
tags = ["dict", "comprehensions", "mapping"]
difficulty = 3

[code]
content = """
words = ["hello", "world", "python", "dictionary", "comprehension"]

# Word lengths
word_lengths = {word: len(word) for word in words}

# Invert a dictionary (swap keys and values)
original = {"a": 1, "b": 2, "c": 3, "d": 4}
inverted = {value: key for key, value in original.items()}

# Filter dictionary entries
prices = {
    "apple": 1.20,
    "banana": 0.50,
    "cherry": 2.50,
    "dragonfruit": 5.00,
    "elderberry": 3.75,
}
expensive = {k: v for k, v in prices.items() if v > 2.0}

# Merge two lists into a dictionary
countries = ["France", "Japan", "Brazil", "Canada"]
capitals = ["Paris", "Tokyo", "Brasilia", "Ottawa"]
country_map = {c: cap for c, cap in zip(countries, capitals)}

# Nested dict comprehension: grouping by first letter
grouped = {}
for word in words:
    grouped.setdefault(word[0], []).append(word)
"""

[[tasks]]
type = "move_to"
anchor = { pattern = "inverted", occurrence = 1 }
description = "Move to 'inverted'"
points = 75
optimal_keys = 4

[[tasks]]
type = "move_to"
anchor = { pattern = "expensive", occurrence = 1 }
description = "Move to 'expensive'"
points = 100
optimal_keys = 5

[[tasks]]
type = "move_to"
anchor = { pattern = "country_map", occurrence = 1 }
description = "Move to 'country_map'"
points = 100
optimal_keys = 6
