zone = "junior"
language = "python"
tags = ["generators", "yield", "iteration"]
difficulty = 3

[code]
content = """
def countdown(start):
    \"\"\"Yield numbers from start down to 1.\"\"\"
    current = start
    while current > 0:
        yield current
        current -= 1


def fibonacci_sequence(limit):
    \"\"\"Generate Fibonacci numbers up to a limit.\"\"\"
    a, b = 0, 1
    while a <= limit:
        yield a
        a, b = b, a + b


def chunked(iterable, size):
    \"\"\"Yield successive chunks of a given size.\"\"\"
    chunk = []
    for item in iterable:
        chunk.append(item)
        if len(chunk) == size:
            yield chunk
            chunk = []
    if chunk:
        yield chunk


def flatten(nested):
    \"\"\"Recursively flatten nested lists.\"\"\"
    for item in nested:
        if isinstance(item, list):
            yield from flatten(item)
        else:
            yield item


data = [[1, [2, 3]], [4, 5], [[6], 7, [8, 9]]]
flat = list(flatten(data))
batches = list(chunked(range(10), 3))
"""

