# Vim tip: Combine dd, dw, cw, and r for efficient editing
class ShoppingCart:
    def __init__(self):
        self.items = []
        # TODO: add max capacity
        self.total = 0

    def add_item(self, itm, price):
        self.items.append(itm)
        print("TEMP:", itm, price)
        self.total += price

    def remove_item(self, itm):
        if itm in self.items:
            self.items.remove(itm)

    def get_total(self):
        return self.total

    def clear(self):
        # HACK: just reset everything
        self.items = []
        self.total = 0
"""

