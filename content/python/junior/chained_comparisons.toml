[code]
content = """
def classify_temperature(celsius):
    \"\"\"Classify temperature using chained comparisons.\"\"\"
    if celsius < -40:
        return "extreme cold"
    elif -40 <= celsius < 0:
        return "freezing"
    elif 0 <= celsius < 15:
        return "cold"
    elif 15 <= celsius < 25:
        return "comfortable"
    elif 25 <= celsius < 35:
        return "warm"
    elif 35 <= celsius <= 50:
        return "hot"
    else:
        return "extreme heat"


def validate_port(port):
    \"\"\"Check if a port number is valid.\"\"\"
    return 1 <= port <= 65535


def is_valid_rgb(r, g, b):
    \"\"\"Validate RGB color values using chained comparisons.\"\"\"
    return 0 <= r <= 255 and 0 <= g <= 255 and 0 <= b <= 255


def grade_score(score):
    \"\"\"Convert a numeric score to a letter grade.\"\"\"
    if not 0 <= score <= 100:
        raise ValueError("Score must be between 0 and 100")
    if 90 <= score <= 100:
        return "A"
    elif 80 <= score < 90:
        return "B"
    elif 70 <= score < 80:
        return "C"
    elif 60 <= score < 70:
        return "D"
    else:
        return "F"


def is_sorted(sequence):
    \"\"\"Check if a sequence is sorted in ascending order.\"\"\"
    return all(a <= b for a, b in zip(sequence, sequence[1:]))


temperatures = [-50, -10, 5, 20, 30, 45, 60]
classifications = {t: classify_temperature(t) for t in temperatures}
"""

