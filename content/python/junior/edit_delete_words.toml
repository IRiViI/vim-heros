content = """
# Vim tip: dw deletes from cursor to start of next word
def parse_config(filepath):
    config = {}
    with open(filepath) as f:
        for line in f:
            key, _, value = line.partition("=")
            config[key.strip()] = value.strip()
    return config


def validate_OBSOLETE_email(address):
    if "@" not in address:
        return False
    parts = address.split("@")
    return len(parts) == 2


class DataProcessor:
    def __init__(self, UNUSED_source):
        self.data = []

    def add(self, item):
        self.data.append(item)
"""

