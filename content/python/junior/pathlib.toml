from pathlib import Path


def organize_directory(source_dir):
    \"\"\"Organize files into subdirectories by extension.\"\"\"
    source = Path(source_dir)
    if not source.is_dir():
        raise ValueError(f"Not a directory: {source}")

    for filepath in source.iterdir():
        if filepath.is_file():
            extension = filepath.suffix.lower() or ".noext"
            target_dir = source / extension.lstrip(".")
            target_dir.mkdir(exist_ok=True)
            destination = target_dir / filepath.name
            filepath.rename(destination)


def find_large_files(directory, min_size_mb=10):
    \"\"\"Find all files larger than min_size_mb in a directory tree.\"\"\"
    threshold = min_size_mb * 1024 * 1024
    root = Path(directory)
    large_files = []
    for item in root.rglob("*"):
        if item.is_file() and item.stat().st_size > threshold:
            size_mb = item.stat().st_size / (1024 * 1024)
            large_files.append((item, round(size_mb, 2)))
    return sorted(large_files, key=lambda x: x[1], reverse=True)


def build_project_tree(root_path, indent=0):
    \"\"\"Print a directory tree structure.\"\"\"
    root = Path(root_path)
    prefix = "  " * indent
    print(f"{prefix}{root.name}/")
    for child in sorted(root.iterdir()):
        if child.is_dir():
            build_project_tree(child, indent + 1)
        else:
            print(f"{'  ' * (indent + 1)}{child.name}")
"""

