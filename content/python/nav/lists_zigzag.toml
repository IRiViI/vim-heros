zone = "nav"
language = "python"
tags = ["lists", "navigation", "zigzag"]
difficulty = 1

[code]
content = """
# Working with Lists

fruits = ["apple", "banana", "cherry"]
colors = ["red", "yellow", "pink"]

print(f"Fruit: {fruits[0]}")
print(f"Color: {colors[0]}")

combined = list(zip(fruits, colors))
print(combined)

favorites = fruits + ["mango", "grape"]
print(favorites)
"""

