zone = "nav"
language = "python"
tags = ["loops", "navigation", "zigzag"]
difficulty = 1

[code]
content = """
# Counting Things

numbers = [4, 8, 15, 16, 23, 42]
total = 0

for num in numbers:
    total = total + num

average = total / len(numbers)

print(f"Numbers: {numbers}")
print(f"Total: {total}")
print(f"Average: {average:.1f}")
"""

