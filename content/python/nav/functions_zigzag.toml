# Rectangle Calculator

def area(width, height):
    return width * height

def perimeter(width, height):
    return 2 * (width + height)

w = 10
h = 5

result_area = area(w, h)
result_peri = perimeter(w, h)

print(f"Area: {result_area}")
print(f"Perimeter: {result_peri}")
"""

