[meta]
id = "py-nav-strings-zigzag"
zone = "nav"
language = "python"
tags = ["strings", "navigation", "zigzag"]
difficulty = 1

[code]
content = """
# String Operations

message = "Hello, World!"
whisper = message.lower()
shout = message.upper()

first_word = message.split(",")[0]
char_count = len(message)

print(f"Original: {message}")
print(f"Whisper: {whisper}")
print(f"Shout: {shout}")
print(f"First word: {first_word}")
"""

# Task 1: move to "message" (warm up)
[[tasks]]
type = "move_to"
anchor = { pattern = "message", occurrence = 1 }
description = "Move to 'message'"
points = 50
optimal_keys = 3
perfect_keys = 2

# Task 2: down and right to "lower" method call
[[tasks]]
type = "move_to"
anchor = { pattern = "lower", occurrence = 1 }
description = "Move to 'lower'"
points = 50
optimal_keys = 4
perfect_keys = 3

# Task 3: down to "upper" method call (close, same column area)
[[tasks]]
