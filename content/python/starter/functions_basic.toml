[code]
content = """
# Basic Functions in Python

def greet(name):
    print(f"Hello, {name}!")

greet("Alice")
greet("Bob")

# Function with no parameters
def display_menu():
    print("=== Main Menu ===")
    print("1. Start Game")
    print("2. Settings")
    print("3. Quit")

display_menu()

# Function that performs a calculation
def add_numbers(a, b):
    result = a + b
    print(f"{a} + {b} = {result}")

add_numbers(5, 3)
add_numbers(10, 20)

# Function with a docstring
def square(number):
    \"\"\"Return the square of a number.\"\"\"
    print(f"The square of {number} is {number * number}")

square(7)
square(12)
"""

