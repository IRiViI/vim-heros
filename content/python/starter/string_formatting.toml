[meta]
id = "py-starter-string-formatting"
zone = "starter"
language = "python"
tags = ["strings", "formatting", "alignment"]
difficulty = 2

[code]
content = """
# String Formatting Techniques

name = "Alice"
balance = 1543.7
percentage = 0.856

# Percent format (old style)
print("Hello, %s! You have $%.2f" % (name, balance))

# str.format() method
print("Hello, {}! Age: {}".format(name, 30))
print("{0} likes {1} and {1}".format("Bob", "pizza"))

# F-string alignment
for item in ["Apple", "Banana", "Cherry"]:
    price = 1.99
    print(f"{item:<15} ${price:>6.2f}")

# Number formatting
print(f"Balance: ${balance:,.2f}")
print(f"Percentage: {percentage:.1%}")
print(f"Binary: {42:b}")
print(f"Hex: {255:x}")
print(f"Octal: {8:o}")

# Padding and fill
for i in range(1, 6):
    print(f"{i:02d}. Item number {i}")

# Center alignment
title = "REPORT"
print(f"{title:=^30}")
print(f"{'Name':<10} {'Score':>10}")
print(f"{'-'*20}")
"""

