[code]
content = """
# VIM TIP: 'j' moves down, 'k' moves up. Stay on the home row!
for i in range(1, 21):
    if i % 15 == 0:
        print("FizzBuzz")
    elif i % 3 == 0:
        print("Fizz")
    elif i % 5 == 0:
        print("Buzz")
    else:
        print(i)
"""

