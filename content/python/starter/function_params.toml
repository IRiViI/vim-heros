[code]
content = """
# Function Parameters and Defaults

def make_coffee(size="medium", milk=False):
    order = f"{size} coffee"
    if milk:
        order += " with milk"
    return order

print(make_coffee())
print(make_coffee("large"))
print(make_coffee("small", True))

# Keyword arguments
def create_profile(name, age, city="Unknown"):
    profile = {
        "name": name,
        "age": age,
        "city": city
    }
    return profile

user = create_profile("Sam", 28, city="Denver")
print(user)

# Multiple default parameters
def format_address(street, city, state="CA", country="USA"):
    return f"{street}, {city}, {state}, {country}"

address = format_address("123 Main St", "Portland", "OR")
print(address)
"""

