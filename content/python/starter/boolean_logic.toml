[meta]
id = "py-starter-boolean-logic"
zone = "starter"
language = "python"
tags = ["booleans", "logic", "operators"]
difficulty = 1

[code]
content = """
# Boolean Logic

# VIM TIP: Use '$' to jump to the end of the current line.

is_sunny = True
is_warm = False

# Logical AND
if is_sunny and is_warm:
    print("Perfect beach day!")
else:
    print("Maybe stay inside")

# Logical OR
has_coffee = False
has_tea = True
if has_coffee or has_tea:
    print("You have a drink")

# Logical NOT
is_raining = False
if not is_raining:
    print("No umbrella needed")

# Combining operators
age = 25
has_ticket = True
is_vip = False
can_enter = (age >= 18 and has_ticket) or is_vip
print(f"Can enter: {can_enter}")

# Truthiness
print(bool(0))
print(bool(42))
print(bool(""))
print(bool("Python"))
print(bool([]))
print(bool([1]))

# Short-circuit evaluation
name = ""
display = name or "Anonymous"
print(f"Display: {display}")
"""

