[meta]
id = "py-starter-for-loops"
zone = "starter"
language = "python"
tags = ["for", "loops", "iteration"]
difficulty = 1

[code]
content = """
# For Loops in Python

fruits = ["apple", "banana", "cherry", "date"]

for fruit in fruits:
    print(f"I like {fruit}")

# Loop through a string
word = "Python"
for letter in word:
    print(letter)

# Loop with index using range
colors = ["red", "green", "blue"]
for i in range(len(colors)):
    print(f"Color {i}: {colors[i]}")

# Nested iteration example
for number in range(1, 6):
    stars = "*" * number
    print(stars)

# Sum all elements
total = 0
numbers = [10, 20, 30, 40]
for n in numbers:
    total += n
print(f"Total: {total}")
"""

