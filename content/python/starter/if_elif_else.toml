[meta]
id = "py-starter-if-elif-else"
zone = "starter"
language = "python"
tags = ["conditionals", "if", "elif", "else"]
difficulty = 1

[code]
content = """
# If, Elif, and Else Statements

temperature = 75

if temperature > 90:
    print("It's hot outside!")
elif temperature > 70:
    print("It's warm and pleasant")
elif temperature > 50:
    print("It's a bit cool")
else:
    print("It's cold outside!")

# Grade checker
score = 85
if score >= 90:
    grade = "A"
elif score >= 80:
    grade = "B"
elif score >= 70:
    grade = "C"
elif score >= 60:
    grade = "D"
else:
    grade = "F"

print(f"Your grade is: {grade}")

# Multiple conditions
age = 20
has_license = True
if age >= 16 and has_license:
    print("You can drive")
else:
    print("You cannot drive yet")
"""

