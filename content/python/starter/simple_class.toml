[code]
content = """
# Simple Class Introduction

class Dog:
    def __init__(self, name, breed, age):
        self.name = name
        self.breed = breed
        self.age = age

    def bark(self):
        print(f"{self.name} says: Woof!")

    def describe(self):
        print(f"{self.name} is a {self.age}-year-old {self.breed}")

    def birthday(self):
        self.age += 1
        print(f"Happy birthday {self.name}! Now {self.age} years old")

# Create instances
buddy = Dog("Buddy", "Golden Retriever", 3)
luna = Dog("Luna", "Husky", 5)

# Call methods
buddy.describe()
buddy.bark()
luna.describe()

# Access attributes
print(f"\\n{buddy.name}'s breed: {buddy.breed}")

# Modify state through methods
buddy.birthday()
buddy.describe()

# A list of dogs
kennel = [buddy, luna, Dog("Max", "Beagle", 2)]
print("\\nAll dogs:")
for dog in kennel:
    dog.describe()
"""

