language = "python"
tags = ["range", "sequences", "iteration"]
difficulty = 1

[code]
content = """
# The Range Function

# Basic range - 0 to 4
for i in range(5):
    print(i, end=" ")
print()

# Range with start and stop
for i in range(2, 8):
    print(i, end=" ")
print()

# Range with step
for i in range(0, 20, 3):
    print(i, end=" ")
print()

# Counting backwards
for i in range(10, 0, -1):
    print(i, end=" ")
print("Go!")

# Convert range to list
first_ten = list(range(1, 11))
print(f"First ten: {first_ten}")

# Using range for repetition
for _ in range(3):
    print("Hip hip hooray!")

# Calculate sum using range
total = 0
for num in range(1, 101):
    total += num
print(f"Sum of 1 to 100: {total}")
"""

