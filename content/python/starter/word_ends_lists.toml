difficulty = 1

[code]
content = """
# Student Grades

student_names = ["Alice", "Bob", "Charlie", "Diana"]
math_scores = [85, 92, 78, 95]
science_scores = [90, 88, 82, 91]

class_average = sum(math_scores) / len(math_scores)
top_score = max(math_scores)
lowest_score = min(math_scores)

for name, math, science in zip(student_names, math_scores, science_scores):
    combined = math + science
    print(f"{name}: Math={math}, Science={science}, Total={combined}")

print(f"Class average: {class_average:.1f}")
print(f"Top score: {top_score}")
"""

