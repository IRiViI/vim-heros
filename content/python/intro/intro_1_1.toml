[meta]
id = "intro-1-1-basic-movement"
zone = "intro"
language = "python"
tags = ["intro", "movement", "hjkl"]
difficulty = 1
intro = true
intro_level = "1-1"

[code]
content = """
# ===================================
# WORLD 1: Motion
# ===================================
#
# Welcome to Vim Heroes!
#
# Code scrolls down. Reach the targets
# before they scroll away.
#
# Your keys:
#   h -- left
#   j -- down
#   k -- up
#   l -- right
#
# Each motion costs 1 energy.
# Energy resets when you hit a target.
#
# The highlighted target below is your
# first objective. Go!
# ===================================

name = "hero"
level = 1
score = 0

greeting = "Welcome to Vim Heroes!"
message = "Use h, j, k, l to move"
"""

# Task 1: move to 'hero'
[[tasks]]
type = "move_to"
anchor = { pattern = "hero", occurrence = 1 }
description = "Move to 'hero' (hint: j then l)"
points = 25
optimal_keys = 3

# Task 2: move to 'score'
[[tasks]]
type = "move_to"
anchor = { pattern = "score", occurrence = 1 }
description = "Move to 'score' (hint: jj)"
points = 25
optimal_keys = 3

# Task 3: move to 'greeting'
[[tasks]]
type = "move_to"
anchor = { pattern = "greeting", occurrence = 1 }
description = "Move to 'greeting' (hint: jj)"
points = 25
optimal_keys = 2

# Task 4: move to 'message'
[[tasks]]
type = "move_to"
anchor = { pattern = "message", occurrence = 1 }
description = "Move to 'message' (hint: j)"
points = 25
optimal_keys = 2
