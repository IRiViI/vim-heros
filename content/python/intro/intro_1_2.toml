[code]
content = """
# ===================================
# Level 1-2: Word jumps & counts
# ===================================
#
# Pressing 'l' 20 times is slow.
# There's a better way:
#
#   w -- jump to next word
#   b -- jump back a word
#   W -- jump to next WORD (skip punct)
#   B -- jump back a WORD
#   e -- jump to end of word
#
# And counts multiply ANY motion:
#   5j -- move 5 lines down (1 motion!)
#   3w -- jump 3 words forward
#
# Targets are further apart now.
# You'll need these to survive.
# ===================================

database_url = "postgres://localhost:5432/app"
secret_key = "super_secret_value_here"
max_retries = 3
timeout = 30

def connect(url, retries, timeout):
    for attempt in range(retries):
        print(f"Connecting to {url}...")
        if try_connect(url, timeout):
            return True
    return False
"""

