[meta]
id = "intro-2-2-line-edges"
zone = "basic_edit"
language = "python"
tags = ["intro", "insert", "I", "A"]
difficulty = 1
intro = true
intro_level = "2-2"

[code]
content = """
# ===================================
# Level 2-2: Line edges
# ===================================
#
# New entry points:
#   I -- insert at beginning of line
#   A -- insert at end of line
#
# Use I to add text at the start.
# Use A to append at the end.
# ===================================

def factorial(n):
    if n <= 1:
        return 1
    result = 1
    for i in range(2, n + 1):
        result *= i
    return result

# Test the function
print(factorial(5))
print(factorial(10))
"""

[[removals]]
