intro = true
intro_level = "2-4"

[code]
content = """
# ===================================
# Level 2-4: Restricted entry points
# ===================================
#
# You know all the insert commands.
# Each task tells you which to use.
# The HUD shows the allowed key.
# ===================================

def binary_search(arr, target):
    left = 0
    right = len(arr) - 1
    while left <= right:
        mid = (left + right) // 2
        if arr[mid] == target:
            return mid
        elif arr[mid] < target:
            left = mid + 1
        else:
            right = mid - 1
    return -1
"""

