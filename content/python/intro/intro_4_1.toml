[meta]
id = "intro-4-1-line-rider"
zone = "intro"
language = "python"
tags = ["intro", "line-motions", "f", "t", "0", "$"]
difficulty = 1
intro = true
intro_level = "4-1"

[code]
content = """
# =============================================
# WORLD 3: Line Rider
# =============================================
#
# Moving within a line is where speed lives.
# These commands get you anywhere on a line:
#
#   0  jump to START of line
#   $  jump to END of line
#   ^  jump to first non-blank character
#
#   f<char>  FIND character forward
#   t<char>  TILL character (one before it)
#   F<char>  find character BACKWARD
#   T<char>  till character backward
#
#   ;  repeat last f/t forward
#   ,  repeat last f/t backward
#
# Example: f( jumps to the next '('
# =============================================

config = {"host": "localhost", "port": 8080, "debug": True}
database_url = "postgres://user:pass@localhost:5432/mydb"
api_endpoint = "https://api.example.com/v2/users"
max_retries = 3
"""

# Task 1: move to 'config'
[[tasks]]
type = "move_to"
anchor = { pattern = "config", occurrence = 1 }
description = "Move to 'config'"
points = 25
optimal_keys = 2

# Task 2: end of 'database_url'
[[tasks]]
type = "move_to"
anchor = { pattern = "database_url", occurrence = 1, at_end = true }
description = "End of 'database_url'"
points = 25
optimal_keys = 3

# Task 3: move to 'api_endpoint'
[[tasks]]
type = "move_to"
anchor = { pattern = "api_endpoint", occurrence = 1 }
description = "Move to 'api_endpoint'"
points = 25
optimal_keys = 2

# Task 4: move to 'max_retries'
[[tasks]]
type = "move_to"
anchor = { pattern = "max_retries", occurrence = 1 }
description = "Move to 'max_retries'"
points = 25
optimal_keys = 2
