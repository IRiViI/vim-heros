[code]
content = """
# ===================================
# Level 1-5: Perfect motions
# ===================================
#
# Final test.
#
# Every target must be reached in
# exactly ONE motion. No mistakes.
#
# You know the tools:
#   h j k l w W b B e f F t T $ 0
#   ...and counts (6j, 3fe, 2w)
#
# Pick the right one. Every time.
# ===================================

name = "Vim Master"
skills = ["h", "j", "k", "l", "w", "b"]

class Player:
    def __init__(self, name, skills):
        self.name = name
        self.skills = skills
        self.level = 1

    def level_up(self):
        self.level += 1
        print(f"{self.name} is now level {self.level}!")

    def show_skills(self):
        for skill in self.skills:
            print(f"  - {skill}")
"""

# Task 1: jump to 'skills' with exact motion (j)
