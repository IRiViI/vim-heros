[meta]
id = "intro-5-1-the-writer"
zone = "intro"
language = "python"
tags = ["intro", "insert-mode", "i", "a", "o"]
difficulty = 1
intro = true
intro_level = "5-1"

[code]
content = """
# =============================================
# WORLD 4: The Writer
# =============================================
#
# Time to actually CHANGE text! Until now
# you've only been moving. These commands
# put you into INSERT MODE:
#
#   i  insert BEFORE cursor
#   a  insert AFTER cursor
#   I  insert at START of line
#   A  insert at END of line
#   o  open new line BELOW
#   O  open new line ABOVE
#
# Press Esc to go back to Normal mode.
#
#   r<char>  REPLACE one character
#   R        enter REPLACE mode (overwrite)
#
# In this game, tasks will tell you what
# text to insert or change!
# =============================================

name = "World"
greeting = "Hello"
counter = 0
status = "ready"
"""

# Task 1: move to 'World'
[[tasks]]
type = "move_to"
anchor = { pattern = "World", occurrence = 1 }
description = "Move to 'World'"
points = 25
optimal_keys = 2

# Task 2: move to 'greeting'
[[tasks]]
type = "move_to"
anchor = { pattern = "greeting", occurrence = 1 }
description = "Move to 'greeting'"
points = 25
optimal_keys = 2

# Task 3: move to 'counter'
[[tasks]]
type = "move_to"
anchor = { pattern = "counter", occurrence = 1 }
description = "Move to 'counter'"
points = 25
optimal_keys = 2

# Task 4: move to 'status'
[[tasks]]
type = "move_to"
anchor = { pattern = "status", occurrence = 1 }
description = "Move to 'status'"
points = 25
optimal_keys = 2
