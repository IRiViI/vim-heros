[meta]
id = "intro-2-5-perfect-entry"
zone = "basic_edit"
language = "python"
tags = ["intro", "insert", "perfect"]
difficulty = 1
intro = true
intro_level = "2-5"

[code]
content = """
# ===================================
# Level 2-5: Perfect entry
# ===================================
#
# Every insertion must use the OPTIMAL
# entry command. No wasted keystrokes.
# ===================================

def insertion_sort(arr):
    for i in range(1, len(arr)):
        key = arr[i]
        j = i - 1
        while j >= 0 and key < arr[j]:
            arr[j + 1] = arr[j]
            j -= 1
        arr[j + 1] = key
    return arr

def is_sorted(arr):
    for i in range(len(arr) - 1):
        if arr[i] > arr[i + 1]:
            return False
    return True
"""

# Must use A (end of line)
[[removals]]
type = "inline"
line_anchor = "key = arr[i]"
remove = "[i]"
description = "Add '[i]' at end (optimal: A)"
entry_point = "A"
points = 75

# Must use o (new line below)
[[removals]]
