[meta]
id = "ts-starter-while-loops"
zone = "starter"
language = "typescript"
tags = ["while", "loops", "control-flow"]
difficulty = 1

[code]
content = """
// While Loops

let countdown = 10;

while (countdown > 0) {
  console.log("T-minus", countdown);
  countdown = countdown - 1;
}
console.log("Liftoff!");

// Summing numbers until threshold
let balance = 0;
let deposit = 100;

while (balance < 500) {
  balance = balance + deposit;
  console.log("Balance:", balance);
}

// Finding first even number
const values = [3, 7, 11, 8, 15, 2];
let index = 0;

while (index < values.length) {
  if (values[index] % 2 === 0) {
    console.log("First even:", values[index]);
    break;
  }
  index = index + 1;
}

console.log("Final balance:", balance);
"""

