[meta]
id = "ts-starter-default-parameters"
zone = "starter"
language = "typescript"
tags = ["default", "parameters", "functions"]
difficulty = 1

[code]
content = """
// Default Parameters

function greet(name: string, greeting: string = "Hello"): string {
  return greeting + ", " + name + "!";
}

function createUser(
  username: string,
  role: string = "viewer",
  active: boolean = true
) {
  return { username, role, active };
}

function paginate(
  items: string[],
  page: number = 1,
  pageSize: number = 10
): string[] {
  const start = (page - 1) * pageSize;
  return items.slice(start, start + pageSize);
}

console.log(greet("Alice"));
console.log(greet("Bob", "Hey"));

const admin = createUser("admin", "admin");
const guest = createUser("guest");

const allItems = ["a", "b", "c", "d", "e", "f"];
const firstPage = paginate(allItems, 1, 3);

console.log("Admin:", admin);
console.log("Guest:", guest);
console.log("Page:", firstPage);
"""

