[code]
content = """
interface Todo {
  userId: number;
  id: number;
  title: string;
  completed: boolean;
}

async function fetchTodo(id: number): Promise<Todo> {
  const response = await fetch(
    `https://jsonplaceholder.typicode.com/todos/${id}`
  );
  if (!response.ok) {
    throw new Error(`HTTP error: ${response.status}`);
  }
  return response.json();
}

async function fetchMultipleTodos(ids: number[]): Promise<Todo[]> {
  const todos: Todo[] = [];
  for (const id of ids) {
    const todo = await fetchTodo(id);
    todos.push(todo);
  }
  return todos;
}

async function getCompletedTodos(): Promise<Todo[]> {
  const todos = await fetchMultipleTodos([1, 2, 3, 4, 5]);
  return todos.filter((todo) => todo.completed);
}

async function main(): Promise<void> {
  try {
    const completed = await getCompletedTodos();
    console.log(`Found ${completed.length} completed todos`);
    completed.forEach((t) => console.log(`  - ${t.title}`));
  } catch (error) {
    console.error("Failed to fetch todos:", error);
  }
}

main();
"""

