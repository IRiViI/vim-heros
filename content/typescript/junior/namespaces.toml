[code]
content = """
namespace Validation {
  export interface Rule {
    name: string;
    validate(value: unknown): boolean;
    message: string;
  }

  export function required(): Rule {
    return {
      name: "required",
      validate: (value) => value !== null && value !== undefined,
      message: "This field is required",
    };
  }

  export function minLength(min: number): Rule {
    return {
      name: "minLength",
      validate: (value) =>
        typeof value === "string" && value.length >= min,
      message: `Minimum length is ${min}`,
    };
  }

  export function maxLength(max: number): Rule {
    return {
      name: "maxLength",
      validate: (value) =>
        typeof value === "string" && value.length <= max,
      message: `Maximum length is ${max}`,
    };
  }

  export function applyRules(value: unknown, rules: Rule[]): string[] {
    return rules
      .filter((rule) => !rule.validate(value))
      .map((rule) => rule.message);
  }
}

const rules = [
  Validation.required(),
  Validation.minLength(3),
  Validation.maxLength(50),
];

const errors = Validation.applyRules("ab", rules);
console.log(errors);
"""

