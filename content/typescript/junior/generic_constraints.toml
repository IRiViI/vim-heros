[meta]
id = "ts-junior-generic-constraints"
zone = "junior"
language = "typescript"
tags = ["generics", "constraints", "extends"]
difficulty = 3

[code]
content = """
// VIM TIP: Use 'ci{' to change inside braces.
interface HasLength {
  length: number;
}

function logLength<T extends HasLength>(item: T): void {
  console.log(`Length: ${item.length}`);
}

function getProperty<T, K extends keyof T>(obj: T, key: K): T[K] {
  return obj[key];
}

interface Identifiable {
  id: string | number;
}

function mergeById<T extends Identifiable>(
  items: T[],
  updates: Partial<T>[]
): T[] {
  return items.map((item) => {
    const update = updates.find(
      (u) => (u as Identifiable).id === item.id
    );
    return update ? { ...item, ...update } : item;
  });
}

const users = [
  { id: 1, name: "Alice", role: "admin" },
  { id: 2, name: "Bob", role: "user" },
];

const merged = mergeById(users, [{ id: 1, name: "Alicia" }]);
console.log(merged);
"""

