[meta]
id = "ts-junior-utility-pick-omit"
zone = "junior"
language = "typescript"
tags = ["utility-types", "pick", "omit"]
difficulty = 3

[code]
content = """
interface Employee {
  id: number;
  firstName: string;
  lastName: string;
  email: string;
  department: string;
  salary: number;
  startDate: Date;
  isActive: boolean;
}

type EmployeeSummary = Pick<Employee, "id" | "firstName" | "lastName">;

type PublicEmployee = Omit<Employee, "salary" | "isActive">;

function displaySummary(employee: EmployeeSummary): string {
  return `${employee.firstName} ${employee.lastName} (#${employee.id})`;
}

function toPublicProfile(employee: Employee): PublicEmployee {
  const { salary, isActive, ...publicData } = employee;
  return publicData;
}

const emp: Employee = {
  id: 42,
  firstName: "Sarah",
  lastName: "Connor",
  email: "sarah@skynet.com",
  department: "Engineering",
  salary: 120000,
  startDate: new Date("2023-01-15"),
  isActive: true,
};

const summary = displaySummary(emp);
const publicProfile = toPublicProfile(emp);
console.log(summary, publicProfile);
"""

