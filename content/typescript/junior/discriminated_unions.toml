[code]
content = """
interface LoadingState {
  status: "loading";
}

interface SuccessState<T> {
  status: "success";
  data: T;
  timestamp: Date;
}

interface ErrorState {
  status: "error";
  message: string;
  code: number;
}

type RequestState<T> = LoadingState | SuccessState<T> | ErrorState;

function renderState<T>(state: RequestState<T>): string {
  switch (state.status) {
    case "loading":
      return "Loading...";
    case "success":
      return `Data received at ${state.timestamp}`;
    case "error":
      return `Error ${state.code}: ${state.message}`;
  }
}

const loading: RequestState<string> = { status: "loading" };
const success: RequestState<string> = {
  status: "success",
  data: "Hello",
  timestamp: new Date(),
};
const failure: RequestState<string> = {
  status: "error",
  message: "Not found",
  code: 404,
};

console.log(renderState(loading));
console.log(renderState(success));
console.log(renderState(failure));
"""

