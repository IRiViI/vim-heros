[meta]
id = "ts-junior-template-literal-types"
zone = "junior"
language = "typescript"
tags = ["template-literal-types", "string-types"]
difficulty = 4

[code]
content = """
type Color = "red" | "green" | "blue";
type Shade = "light" | "dark";

type ThemedColor = `${Shade}-${Color}`;

type EventName = "click" | "focus" | "blur";
type EventHandler = `on${Capitalize<EventName>}`;

type HttpMethod = "GET" | "POST" | "PUT" | "DELETE";
type ApiRoute = `/api/${string}`;

type CssUnit = "px" | "rem" | "em" | "vh" | "vw";
type CssValue = `${number}${CssUnit}`;

function setStyle(property: string, value: CssValue): void {
  console.log(`Setting ${property} to ${value}`);
}

setStyle("width", "100px");
setStyle("margin", "2rem");

type Getter<T extends string> = `get${Capitalize<T>}`;
type Setter<T extends string> = `set${Capitalize<T>}`;

type PropertyAccessors<T extends string> = {
  [K in T as Getter<K>]: () => unknown;
} & {
  [K in T as Setter<K>]: (value: unknown) => void;
};

type NameAccessors = PropertyAccessors<"name" | "age">;
"""

[[tasks]]
type = "move_to"
anchor = { pattern = "ThemedColor", occurrence = 1 }
description = "Move to 'ThemedColor'"
points = 75
optimal_keys = 5

[[tasks]]
type = "move_to"
anchor = { pattern = "EventHandler", occurrence = 1 }
description = "Move to 'EventHandler'"
points = 100
optimal_keys = 8

[[tasks]]
type = "move_to"
anchor = { pattern = "PropertyAccessors", occurrence = 1 }
description = "Move to 'PropertyAccessors'"
points = 125
optimal_keys = 10
