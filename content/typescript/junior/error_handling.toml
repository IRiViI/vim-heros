[meta]
id = "ts-junior-error-handling"
zone = "junior"
language = "typescript"
tags = ["error-handling", "try-catch"]
difficulty = 3

[code]
content = """
class AppError extends Error {
  constructor(
    message: string,
    public readonly code: string,
    public readonly statusCode: number
  ) {
    super(message);
    this.name = "AppError";
  }
}

class ValidationError extends AppError {
  constructor(
    message: string,
    public readonly field: string
  ) {
    super(message, "VALIDATION_ERROR", 400);
    this.name = "ValidationError";
  }
}

class NotFoundError extends AppError {
  constructor(resource: string, id: string) {
    super(`${resource} with id ${id} not found`, "NOT_FOUND", 404);
    this.name = "NotFoundError";
  }
}

function handleError(error: unknown): void {
  if (error instanceof ValidationError) {
    console.error(`Validation failed on ${error.field}: ${error.message}`);
  } else if (error instanceof NotFoundError) {
    console.error(`Not found: ${error.message}`);
  } else if (error instanceof AppError) {
    console.error(`App error [${error.code}]: ${error.message}`);
  } else if (error instanceof Error) {
    console.error(`Unexpected: ${error.message}`);
  } else {
    console.error("Unknown error occurred");
  }
}

try {
  throw new ValidationError("Email is invalid", "email");
} catch (error) {
  handleError(error);
}
"""

