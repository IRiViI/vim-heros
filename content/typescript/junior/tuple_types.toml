[meta]
id = "ts-junior-tuple-types"
zone = "junior"
language = "typescript"
tags = ["tuples", "labeled-tuples"]
difficulty = 3

[code]
content = """
// VIM TIP: Use 'dt<char>' to delete to (but not including) a character.
type Coordinate = [x: number, y: number];
type Coordinate3D = [x: number, y: number, z: number];

type HttpResult = [status: number, body: string, headers: Record<string, string>];

function parseCoordinate(input: string): Coordinate {
  const parts = input.split(",").map(Number);
  return [parts[0], parts[1]];
}

function distance(a: Coordinate, b: Coordinate): number {
  const dx = b[0] - a[0];
  const dy = b[1] - a[1];
  return Math.sqrt(dx * dx + dy * dy);
}

type Range = [min: number, max: number];

function clampToRange(value: number, range: Range): number {
  return Math.min(Math.max(value, range[0]), range[1]);
}

function splitResult<T, E>(
  results: Array<[ok: boolean, value: T | E]>
): [successes: T[], failures: E[]] {
  const successes: T[] = [];
  const failures: E[] = [];
  for (const [ok, value] of results) {
    if (ok) successes.push(value as T);
    else failures.push(value as E);
  }
  return [successes, failures];
}

const point1: Coordinate = [3, 4];
const point2: Coordinate = [6, 8];
console.log(distance(point1, point2));
"""

