[code]
content = """
const SERIALIZE = Symbol("serialize");
const DESERIALIZE = Symbol("deserialize");
const TYPE_ID = Symbol("typeId");

interface Serializable {
  [SERIALIZE](): string;
}

interface Deserializable<T> {
  [DESERIALIZE](data: string): T;
}

class Color implements Serializable {
  static readonly [TYPE_ID] = "Color";

  constructor(
    public readonly red: number,
    public readonly green: number,
    public readonly blue: number
  ) {}

  [SERIALIZE](): string {
    return JSON.stringify({
      type: Color[TYPE_ID],
      r: this.red,
      g: this.green,
      b: this.blue,
    });
  }

  toHex(): string {
    const hex = (n: number) => n.toString(16).padStart(2, "0");
    return `#${hex(this.red)}${hex(this.green)}${hex(this.blue)}`;
  }

  static fromHex(hexString: string): Color {
    const r = parseInt(hexString.slice(1, 3), 16);
    const g = parseInt(hexString.slice(3, 5), 16);
    const b = parseInt(hexString.slice(5, 7), 16);
    return new Color(r, g, b);
  }
}

const crimson = new Color(220, 20, 60);
console.log(crimson.toHex());
console.log(crimson[SERIALIZE]());
"""

