<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World 9: Macros — Vim Heroes</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #1a1a2e;
  color: #e0e0e0;
  font-family: 'Courier New', Consolas, monospace;
  min-height: 100vh;
  overflow-x: hidden;
}

a { color: #00ffc8; text-decoration: none; }
a:hover { text-decoration: underline; }

.back-link {
  display: inline-block;
  margin: 18px 0 0 24px;
  font-size: 14px;
  opacity: 0.8;
}

h1 {
  text-align: center;
  margin: 12px 0 6px;
  font-size: 26px;
  color: #00ffc8;
  text-shadow: 0 0 12px rgba(0,255,200,0.4);
  letter-spacing: 2px;
}

.subtitle {
  text-align: center;
  font-size: 13px;
  color: #888;
  margin-bottom: 14px;
  letter-spacing: 1px;
}

/* Tabs */
.tabs {
  display: flex;
  justify-content: center;
  gap: 4px;
  margin-bottom: 16px;
}

.tab-btn {
  background: #16213e;
  border: 1px solid #0f3460;
  color: #aaa;
  padding: 10px 22px;
  font-family: inherit;
  font-size: 13px;
  cursor: pointer;
  border-radius: 6px 6px 0 0;
  transition: all 0.25s;
}

.tab-btn:hover { color: #00ffc8; border-color: #00ffc8; }
.tab-btn.active {
  background: #0f3460;
  color: #00ffc8;
  border-color: #00ffc8;
  border-bottom-color: #0f3460;
  text-shadow: 0 0 8px rgba(0,255,200,0.5);
}

/* Demo container */
.demo-container {
  max-width: 860px;
  margin: 0 auto;
  padding: 0 20px 40px;
}

.tab-panel {
  display: none;
  background: #16213e;
  border: 1px solid #0f3460;
  border-radius: 0 8px 8px 8px;
  padding: 20px;
  min-height: 480px;
  position: relative;
}

.tab-panel.active { display: block; }

/* Canvas */
.demo-canvas {
  width: 100%;
  height: 360px;
  background: #0d1117;
  border-radius: 6px;
  border: 1px solid #1a3a5c;
  position: relative;
  overflow: hidden;
  margin-bottom: 14px;
}

/* Captions */
.caption-bar {
  background: #0d1117;
  border: 1px solid #1a3a5c;
  border-radius: 6px;
  padding: 14px 18px;
  font-size: 14px;
  line-height: 1.5;
  color: #c8d6e5;
  text-align: center;
  min-height: 52px;
  transition: opacity 0.3s;
}

.caption-bar .key {
  display: inline;
  background: #00ffc8;
  color: #0d1117;
  padding: 1px 6px;
  border-radius: 3px;
  font-weight: bold;
  font-size: 13px;
}

/* REC indicator */
.rec-indicator {
  position: absolute;
  top: 10px;
  right: 14px;
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  font-weight: bold;
  color: #ff4444;
  opacity: 0;
  transition: opacity 0.3s;
}

.rec-indicator.on { opacity: 1; }

.rec-dot {
  width: 10px;
  height: 10px;
  background: #ff4444;
  border-radius: 50%;
  animation: recBlink 0.8s infinite;
}

@keyframes recBlink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.2; }
}

/* Counter */
.counter {
  position: absolute;
  bottom: 10px;
  right: 14px;
  font-size: 13px;
  color: #00ffc8;
  opacity: 0;
  transition: opacity 0.3s;
}

.counter.on { opacity: 1; }

/* Keypress display */
.keypress-display {
  position: absolute;
  bottom: 10px;
  left: 14px;
  font-size: 12px;
  color: #ffcc00;
  opacity: 0;
  transition: opacity 0.3s;
}

.keypress-display.on { opacity: 1; }

/* Option label */
.option-label {
  font-size: 11px;
  color: #555;
  text-align: right;
  margin-top: 6px;
  letter-spacing: 1px;
}

/* Canvas rendering helpers - all done in JS via canvas API */

</style>
</head>
<body>

<a href="index.html" class="back-link">&larr; Back to Overview</a>
<h1>WORLD 9: MACROS</h1>
<p class="subtitle">q{a-z} &middot; @{a-z} &middot; @@ &mdash; record and replay command sequences</p>

<div class="demo-container">
  <div class="tabs">
    <button class="tab-btn active" data-tab="a">A: DJ / Loop Station</button>
    <button class="tab-btn" data-tab="b">B: Robot Factory</button>
    <button class="tab-btn" data-tab="c">C: Clone Army</button>
  </div>

  <!-- Option A -->
  <div class="tab-panel active" id="panel-a">
    <div class="demo-canvas" id="canvas-a-wrap">
      <canvas id="cvA" width="820" height="360"></canvas>
      <div class="rec-indicator" id="recA"><div class="rec-dot"></div>REC</div>
      <div class="counter" id="counterA"></div>
      <div class="keypress-display" id="keysA"></div>
    </div>
    <div class="caption-bar" id="captionA"></div>
    <p class="option-label">OPTION A &mdash; DJ / LOOP STATION</p>
  </div>

  <!-- Option B -->
  <div class="tab-panel" id="panel-b">
    <div class="demo-canvas" id="canvas-b-wrap">
      <canvas id="cvB" width="820" height="360"></canvas>
      <div class="rec-indicator" id="recB"><div class="rec-dot"></div>REC</div>
      <div class="counter" id="counterB"></div>
      <div class="keypress-display" id="keysB"></div>
    </div>
    <div class="caption-bar" id="captionB"></div>
    <p class="option-label">OPTION B &mdash; ROBOT FACTORY</p>
  </div>

  <!-- Option C -->
  <div class="tab-panel" id="panel-c">
    <div class="demo-canvas" id="canvas-c-wrap">
      <canvas id="cvC" width="820" height="360"></canvas>
      <div class="rec-indicator" id="recC"><div class="rec-dot"></div>REC</div>
      <div class="counter" id="counterC"></div>
      <div class="keypress-display" id="keysC"></div>
    </div>
    <div class="caption-bar" id="captionC"></div>
    <p class="option-label">OPTION C &mdash; CLONE ARMY</p>
  </div>
</div>

<script>
// ─── Utility ───────────────────────────────────────────────────────
function lerp(a, b, t) { return a + (b - a) * Math.min(1, Math.max(0, t)); }
function ease(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }

// Tab switching
const tabBtns = document.querySelectorAll('.tab-btn');
const panels = document.querySelectorAll('.tab-panel');
tabBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    tabBtns.forEach(b => b.classList.remove('active'));
    panels.forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('panel-' + btn.dataset.tab).classList.add('active');
  });
});

// Resize canvases
function resizeCanvas(cv) {
  const wrap = cv.parentElement;
  let cw = wrap.clientWidth, ch = wrap.clientHeight;
  if(!cw || !ch) {
    const activeWrap = document.querySelector('.tab-panel.active .demo-canvas');
    if(activeWrap) { cw = activeWrap.clientWidth; ch = activeWrap.clientHeight; }
    else { cw = 820; ch = 360; }
  }
  cv.width = cw;
  cv.height = ch;
}

const cvA = document.getElementById('cvA');
const cvB = document.getElementById('cvB');
const cvC = document.getElementById('cvC');
[cvA, cvB, cvC].forEach(resizeCanvas);
window.addEventListener('resize', () => [cvA, cvB, cvC].forEach(resizeCanvas));

// ═══════════════════════════════════════════════════════════════════
// OPTION A: DJ / Loop Station
// ═══════════════════════════════════════════════════════════════════
(function() {
  const ctx = cvA.getContext('2d');
  const rec = document.getElementById('recA');
  const counter = document.getElementById('counterA');
  const keys = document.getElementById('keysA');
  const caption = document.getElementById('captionA');

  const LOOP = 15000; // 15s loop
  const lines = [
    'let data = fetch_data("users");',
    'let data = fetch_data("posts");',
    'let data = fetch_data("tags");',
    'let data = fetch_data("roles");',
    'let data = fetch_data("perms");',
    'let data = fetch_data("logs");',
    'let data = fetch_data("keys");',
    'let data = fetch_data("vals");',
  ];
  const edited = (s) => s.replace('let data = ', 'let result = await ');

  const captions = [
    { text: '<span class="key">qa</span> starts recording your track — every keystroke is captured', start: 0, end: 0.3 },
    { text: 'Perform the edit once, then <span class="key">q</span> to stop recording', start: 0.3, end: 0.5 },
    { text: '<span class="key">@a</span> drops the beat — replays your macro on every line. <span class="key">8@a</span> does all 8 at once', start: 0.5, end: 1.0 },
  ];

  const editKeys = ['c', 'w', 'r', 'e', 's', 'u', 'l', 't', ' ', '=', ' ', 'a', 'w', 'a', 'i', 't', ' ', 'Esc', 'j'];

  let startTime = performance.now();

  function draw(now) {
    const elapsed = (now - startTime) % LOOP;
    const t = elapsed / LOOP; // 0..1
    const W = cvA.width, H = cvA.height;
    ctx.clearRect(0, 0, W, H);

    // Background grid
    ctx.strokeStyle = '#1a2a3a';
    ctx.lineWidth = 1;
    for (let x = 0; x < W; x += 40) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
    }
    for (let y = 0; y < H; y += 40) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }

    // Title area
    ctx.fillStyle = '#00ffc8';
    ctx.font = 'bold 11px Courier New';
    ctx.fillText('LOOP STATION', 14, 20);

    // Determine phase
    const recording = t >= 0.05 && t < 0.42;
    const waveShow = t >= 0.42 && t < 0.5;
    const replaying = t >= 0.5 && t < 0.95;

    // REC indicator
    rec.classList.toggle('on', recording);

    // Code lines
    const lineH = 28;
    const startY = 50;
    const codeX = 60;

    let editedCount = 0;
    if (replaying) {
      const replayT = (t - 0.5) / 0.45;
      editedCount = Math.min(8, 1 + Math.floor(replayT * 8));
    }

    // Recording edit progress on line 0
    let line0EditProgress = 0;
    if (recording) {
      line0EditProgress = (t - 0.05) / 0.37;
    } else if (t >= 0.42) {
      line0EditProgress = 1;
    }

    for (let i = 0; i < 8; i++) {
      const y = startY + i * lineH;

      // Line number
      ctx.fillStyle = '#555';
      ctx.font = '13px Courier New';
      ctx.fillText((i + 1).toString(), 14, y + 14);

      // Determine line text
      let lineText = lines[i];
      let isEdited = false;

      if (i === 0 && line0EditProgress > 0) {
        if (line0EditProgress >= 1) {
          lineText = edited(lines[i]);
          isEdited = true;
        } else {
          // Show partial edit
          const orig = lines[i];
          const target = edited(lines[i]);
          const charCount = Math.floor(line0EditProgress * target.length);
          lineText = target.substring(0, charCount) + orig.substring(charCount);
          isEdited = line0EditProgress > 0.5;
        }
      } else if (i > 0 && i < editedCount) {
        lineText = edited(lines[i]);
        isEdited = true;
      }

      // Background highlight for currently editing line
      if ((recording && i === 0) || (replaying && i === editedCount - 1 && editedCount <= 8)) {
        ctx.fillStyle = 'rgba(0,255,200,0.06)';
        ctx.fillRect(codeX - 6, y - 2, W - codeX - 10, lineH);
      }

      ctx.font = '13px Courier New';
      ctx.fillStyle = isEdited ? '#00ffc8' : '#8892b0';
      ctx.fillText(lineText, codeX, y + 14);

      // Cursor on editing line
      if (recording && i === 0) {
        const cursorPos = Math.floor(line0EditProgress * lineText.length);
        const cursorX = codeX + cursorPos * 7.8;
        ctx.fillStyle = '#ffcc00';
        ctx.globalAlpha = (Math.sin(now * 0.008) > 0) ? 1 : 0.3;
        ctx.fillRect(cursorX, y, 8, lineH - 4);
        ctx.globalAlpha = 1;
      }
    }

    // Waveform visualization (bottom area)
    const waveY = startY + 8 * lineH + 20;
    const waveH = H - waveY - 10;

    if (t >= 0.42) {
      // Draw waveform bar
      ctx.fillStyle = '#0d2137';
      ctx.fillRect(14, waveY, W - 28, waveH);
      ctx.strokeStyle = '#1a3a5c';
      ctx.strokeRect(14, waveY, W - 28, waveH);

      ctx.fillStyle = '#00ffc8';
      ctx.font = 'bold 10px Courier New';
      ctx.fillText('MACRO @a', 20, waveY + 14);

      // Waveform
      const waveW = W - 56;
      const waveMid = waveY + waveH / 2 + 4;
      const amp = waveH * 0.3;

      ctx.beginPath();
      ctx.strokeStyle = replaying ? '#00ffc8' : '#0f6050';
      ctx.lineWidth = 2;
      for (let x = 0; x < waveW; x++) {
        const xNorm = x / waveW;
        const v = Math.sin(xNorm * 20 + now * 0.003) * amp * (0.3 + 0.7 * Math.sin(xNorm * Math.PI));
        const px = 28 + x;
        if (x === 0) ctx.moveTo(px, waveMid + v);
        else ctx.lineTo(px, waveMid + v);
      }
      ctx.stroke();
      ctx.lineWidth = 1;

      // Beat drop waves during replay
      if (replaying) {
        const replayT = (t - 0.5) / 0.45;
        for (let i = 0; i < 5; i++) {
          const wt = (replayT * 5 - i);
          if (wt > 0 && wt < 1) {
            ctx.beginPath();
            ctx.arc(W / 2, waveMid, wt * W * 0.3, 0, Math.PI * 2);
            ctx.strokeStyle = `rgba(0,255,200,${0.3 * (1 - wt)})`;
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.lineWidth = 1;
          }
        }
      }
    }

    // Keypress display
    if (recording) {
      const keyIdx = Math.floor(line0EditProgress * editKeys.length);
      const keyText = editKeys[Math.min(keyIdx, editKeys.length - 1)];
      keys.textContent = 'Keypress: ' + keyText;
      keys.classList.add('on');
    } else if (replaying) {
      keys.textContent = '@a (replay)';
      keys.classList.add('on');
    } else {
      keys.classList.remove('on');
    }

    // Counter
    if (replaying) {
      counter.textContent = 'Lines automated: ' + editedCount + '/8';
      counter.classList.add('on');
    } else {
      counter.classList.remove('on');
    }

    // Loop complete flash
    if (t > 0.93) {
      const flash = (t - 0.93) / 0.07;
      ctx.fillStyle = `rgba(0,255,200,${0.15 * (1 - flash)})`;
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#00ffc8';
      ctx.font = 'bold 20px Courier New';
      ctx.textAlign = 'center';
      ctx.fillText('LOOP COMPLETE', W / 2, H / 2);
      ctx.textAlign = 'left';
    }

    // Caption
    for (const c of captions) {
      if (t >= c.start && t < c.end) {
        caption.innerHTML = c.text;
        break;
      }
    }

    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
})();

// ═══════════════════════════════════════════════════════════════════
// OPTION B: Robot Factory
// ═══════════════════════════════════════════════════════════════════
(function() {
  const ctx = cvB.getContext('2d');
  const rec = document.getElementById('recB');
  const counter = document.getElementById('counterB');
  const keys = document.getElementById('keysB');
  const caption = document.getElementById('captionB');

  const LOOP = 15000;
  const lines = [
    'print("debug: " + x)',
    'print("debug: " + y)',
    'print("debug: " + z)',
    'print("debug: " + w)',
    'print("debug: " + v)',
    'print("debug: " + u)',
  ];
  const edited = (s) => s.replace('print("debug: " + ', 'log.info(');

  const captions = [
    { text: 'Record a macro by doing the task once — <span class="key">qa</span> records into register a', start: 0, end: 0.35 },
    { text: 'Deploy your robot (<span class="key">@a</span>) to automate the same task across all lines', start: 0.35, end: 0.65 },
    { text: 'One recording handles hundreds of repetitive edits — work smarter', start: 0.65, end: 1.0 },
  ];

  let startTime = performance.now();

  function drawRobotArm(x, y, angle, color, size) {
    ctx.save();
    ctx.translate(x, y);
    // Base
    ctx.fillStyle = color;
    ctx.fillRect(-size * 0.4, -size * 0.1, size * 0.8, size * 0.2);
    // Arm segment 1
    ctx.rotate(angle);
    ctx.fillRect(0, -size * 0.06, size * 0.6, size * 0.12);
    // Joint
    ctx.beginPath();
    ctx.arc(size * 0.6, 0, size * 0.08, 0, Math.PI * 2);
    ctx.fill();
    // Arm segment 2
    ctx.translate(size * 0.6, 0);
    ctx.rotate(angle * 0.5);
    ctx.fillRect(0, -size * 0.05, size * 0.4, size * 0.1);
    // Gripper
    ctx.translate(size * 0.4, 0);
    ctx.fillRect(0, -size * 0.1, size * 0.06, size * 0.08);
    ctx.fillRect(0, size * 0.02, size * 0.06, size * 0.08);
    ctx.restore();
  }

  function drawConveyorBelt(y, W) {
    ctx.fillStyle = '#2a2a3e';
    ctx.fillRect(0, y, W, 30);
    ctx.strokeStyle = '#3a3a5e';
    ctx.lineWidth = 1;
    const now = performance.now();
    const offset = (now * 0.03) % 20;
    for (let x = -20 + offset; x < W; x += 20) {
      ctx.beginPath();
      ctx.moveTo(x, y);
      ctx.lineTo(x + 10, y + 30);
      ctx.stroke();
    }
    // Rails
    ctx.strokeStyle = '#4a4a6e';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, y + 30); ctx.lineTo(W, y + 30); ctx.stroke();
  }

  function drawProduct(x, y, text, done) {
    ctx.fillStyle = done ? '#0a2a1a' : '#1a1a2e';
    ctx.strokeStyle = done ? '#00ffc8' : '#3a3a5e';
    ctx.lineWidth = 1;
    const w = 120, h = 24;
    ctx.fillRect(x - w/2, y - h/2, w, h);
    ctx.strokeRect(x - w/2, y - h/2, w, h);
    ctx.fillStyle = done ? '#00ffc8' : '#8892b0';
    ctx.font = '10px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText(text.length > 18 ? text.substring(0, 18) + '..' : text, x, y + 4);
    ctx.textAlign = 'left';
    if (done) {
      ctx.fillStyle = '#00ffc8';
      ctx.font = 'bold 12px Courier New';
      ctx.fillText('\u2713', x + w/2 + 4, y + 4);
    }
  }

  function draw(now) {
    const elapsed = (now - startTime) % LOOP;
    const t = elapsed / LOOP;
    const W = cvB.width, H = cvB.height;
    ctx.clearRect(0, 0, W, H);

    // Background: factory floor pattern
    ctx.fillStyle = '#0d1117';
    ctx.fillRect(0, 0, W, H);
    ctx.strokeStyle = '#151f2e';
    for (let x = 0; x < W; x += 50) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
    }
    for (let y = 0; y < H; y += 50) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }

    // Title
    ctx.fillStyle = '#ffcc00';
    ctx.font = 'bold 11px Courier New';
    ctx.fillText('ROBOT FACTORY', 14, 20);

    const recording = t >= 0.05 && t < 0.35;
    const deploying = t >= 0.4 && t < 0.9;

    rec.classList.toggle('on', recording);

    // --- Phase 1: Manual recording (top half) ---
    const manualY = 60;
    ctx.fillStyle = '#aaa';
    ctx.font = '10px Courier New';
    ctx.fillText('RECORDING STATION', 14, manualY - 10);

    drawConveyorBelt(manualY + 40, W);

    // Human worker (simple figure)
    const workerX = recording ? lerp(140, 260, ease((t - 0.05) / 0.3)) : 140;
    const workerY = manualY + 20;

    // Human figure
    ctx.fillStyle = '#ffcc00';
    ctx.beginPath();
    ctx.arc(workerX, workerY - 12, 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#ffcc00';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(workerX, workerY - 6);
    ctx.lineTo(workerX, workerY + 8);
    ctx.stroke();
    // Arms
    const armAngle = Math.sin(now * 0.005) * 0.3;
    ctx.beginPath();
    ctx.moveTo(workerX - 8, workerY + 2 + Math.sin(now * 0.008) * 2);
    ctx.lineTo(workerX, workerY);
    ctx.lineTo(workerX + 8, workerY + 2 - Math.sin(now * 0.008) * 2);
    ctx.stroke();
    ctx.lineWidth = 1;

    // Product on recording station
    const prod0Done = t > 0.3;
    drawProduct(200, manualY + 55, prod0Done ? edited(lines[0]) : lines[0], prod0Done);

    // Recording progress text
    if (recording) {
      const rp = (t - 0.05) / 0.3;
      const editSteps = ['cw', 'log', '.info(', 'Esc'];
      const stepIdx = Math.min(editSteps.length - 1, Math.floor(rp * editSteps.length));
      keys.textContent = 'Keys: qa ' + editSteps.slice(0, stepIdx + 1).join(' ') + ' q';
      keys.classList.add('on');
    }

    // --- Phase 2: Assembly line (bottom half) ---
    const assemblyY = manualY + 100;
    ctx.fillStyle = '#aaa';
    ctx.font = '10px Courier New';
    ctx.fillText('ASSEMBLY LINE — @a DEPLOYMENT', 14, assemblyY - 5);

    drawConveyorBelt(assemblyY + 40, W);

    // Manual vs Automated comparison
    if (deploying || t >= 0.9) {
      const dt = deploying ? (t - 0.4) / 0.5 : 1;

      // Show split view label
      const splitX = W / 2;
      ctx.strokeStyle = '#3a3a5e';
      ctx.setLineDash([4, 4]);
      ctx.beginPath();
      ctx.moveTo(splitX, assemblyY + 80);
      ctx.lineTo(splitX, H - 20);
      ctx.stroke();
      ctx.setLineDash([]);

      ctx.fillStyle = '#ff6666';
      ctx.font = 'bold 10px Courier New';
      ctx.fillText('MANUAL (no macro)', 14, assemblyY + 95);

      ctx.fillStyle = '#00ffc8';
      ctx.fillText('AUTOMATED (@a)', splitX + 14, assemblyY + 95);

      // Manual side: slow, one at a time
      const manualDone = Math.min(5, Math.floor(dt * 2));
      for (let i = 0; i < 5; i++) {
        const px = 40 + i * 78;
        if (px > splitX - 70) continue;
        const done = i < manualDone;
        drawProduct(px + 30, assemblyY + 120, done ? edited(lines[i + 1]) : lines[i + 1], done);
      }

      // Manual time bar
      ctx.fillStyle = '#331a1a';
      ctx.fillRect(14, assemblyY + 145, splitX - 28, 12);
      ctx.fillStyle = '#ff6666';
      ctx.fillRect(14, assemblyY + 145, (splitX - 28) * Math.min(1, dt), 12);
      ctx.fillStyle = '#aaa';
      ctx.font = '9px Courier New';
      ctx.fillText('Time: ' + (dt * 50).toFixed(0) + 's', 14, assemblyY + 172);

      // Automated side: all at once with robots
      const autoDone = Math.min(5, Math.floor(dt * 5 * 2.5));
      for (let i = 0; i < 5; i++) {
        const px = splitX + 20 + i * 68;
        if (px > W - 40) continue;
        const done = i < autoDone;
        drawProduct(px + 25, assemblyY + 120, done ? edited(lines[i + 1]) : lines[i + 1], done);

        // Robot arm for each
        if (done || (i === autoDone && dt > 0)) {
          const armColor = done ? '#00ffc8' : '#1a5a4a';
          const angle = done ? -0.3 : -0.8 + Math.sin(now * 0.01) * 0.2;
          drawRobotArm(px + 25, assemblyY + 98, angle, armColor, 20);
        }
      }

      // Automated time bar
      ctx.fillStyle = '#0a2a1a';
      ctx.fillRect(splitX + 14, assemblyY + 145, W - splitX - 28, 12);
      ctx.fillStyle = '#00ffc8';
      ctx.fillRect(splitX + 14, assemblyY + 145, (W - splitX - 28) * Math.min(1, dt * 2.5), 12);
      ctx.fillStyle = '#aaa';
      ctx.font = '9px Courier New';
      ctx.fillText('Time: ' + Math.min(dt * 50, dt * 50 / 2.5).toFixed(0) + 's', splitX + 14, assemblyY + 172);

      counter.textContent = 'Automated: ' + autoDone + '/5';
      counter.classList.add('on');
    }

    // Robot arms on recording station products
    if (deploying) {
      for (let i = 1; i < 6; i++) {
        const px = 60 + i * 100;
        if (px > W - 20) break;
        const angle = -0.5 + Math.sin(now * 0.008 + i) * 0.3;
        drawRobotArm(px, assemblyY + 28, angle, '#00ffc8', 16);
      }
    }

    if (!recording && !deploying) {
      keys.classList.remove('on');
    }
    if (!deploying && t < 0.4) {
      counter.classList.remove('on');
    }

    if (deploying) {
      keys.textContent = '@a (deploying robots)';
      keys.classList.add('on');
    }

    // Caption
    for (const c of captions) {
      if (t >= c.start && t < c.end) {
        caption.innerHTML = c.text;
        break;
      }
    }

    // Victory
    if (t > 0.9) {
      ctx.fillStyle = `rgba(0,255,200,${0.12 * Math.sin(now * 0.005)})`;
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#00ffc8';
      ctx.font = 'bold 16px Courier New';
      ctx.textAlign = 'center';
      ctx.fillText('AUTOMATION COMPLETE', W / 2, 40);
      ctx.textAlign = 'left';
    }

    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
})();

// ═══════════════════════════════════════════════════════════════════
// OPTION C: Clone Army
// ═══════════════════════════════════════════════════════════════════
(function() {
  const ctx = cvC.getContext('2d');
  const rec = document.getElementById('recC');
  const counter = document.getElementById('counterC');
  const keys = document.getElementById('keysC');
  const caption = document.getElementById('captionC');

  const LOOP = 15000;

  const enemies = [];
  const COLS = 8, ROWS = 4;
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      enemies.push({ r, c, fixed: false });
    }
  }

  const badCode = 'var x=1';
  const goodCode = 'const x=1';

  const captions = [
    { text: 'Train one clone with <span class="key">qa</span> — it learns your exact command sequence', start: 0, end: 0.35 },
    { text: '<span class="key">@a</span> deploys a clone, <span class="key">@@</span> sends another — or <span class="key">10@a</span> deploys ten at once', start: 0.35, end: 0.65 },
    { text: 'Your clone army handles repetitive code — the power of Vim macros', start: 0.65, end: 1.0 },
  ];

  let startTime = performance.now();

  function drawTrooper(x, y, color, size, facing) {
    ctx.save();
    ctx.translate(x, y);
    if (facing < 0) ctx.scale(-1, 1);
    // Helmet
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(0, -size * 0.3, size * 0.3, 0, Math.PI * 2);
    ctx.fill();
    // Visor
    ctx.fillStyle = '#0d1117';
    ctx.fillRect(size * 0.05, -size * 0.35, size * 0.2, size * 0.1);
    // Body
    ctx.fillStyle = color;
    ctx.fillRect(-size * 0.2, 0, size * 0.4, size * 0.4);
    // Legs
    ctx.fillRect(-size * 0.2, size * 0.4, size * 0.15, size * 0.25);
    ctx.fillRect(size * 0.05, size * 0.4, size * 0.15, size * 0.25);
    // Weapon
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(size * 0.2, size * 0.1);
    ctx.lineTo(size * 0.5, -size * 0.1);
    ctx.stroke();
    ctx.lineWidth = 1;
    ctx.restore();
  }

  function drawEnemy(x, y, size, fixed) {
    ctx.fillStyle = fixed ? '#0a3a2a' : '#3a1a1a';
    ctx.strokeStyle = fixed ? '#00ffc8' : '#ff4444';
    ctx.lineWidth = 1;
    const w = size * 1.6, h = size * 0.9;
    ctx.fillRect(x - w/2, y - h/2, w, h);
    ctx.strokeRect(x - w/2, y - h/2, w, h);
    ctx.fillStyle = fixed ? '#00ffc8' : '#ff6666';
    ctx.font = (size * 0.4) + 'px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText(fixed ? goodCode : badCode, x, y + size * 0.12);
    ctx.textAlign = 'left';
  }

  function draw(now) {
    const elapsed = (now - startTime) % LOOP;
    const t = elapsed / LOOP;
    const W = cvC.width, H = cvC.height;
    ctx.clearRect(0, 0, W, H);

    // Background battlefield
    ctx.fillStyle = '#0d1117';
    ctx.fillRect(0, 0, W, H);

    // Ground grid
    ctx.strokeStyle = '#151f2e';
    const gridSize = 40;
    for (let x = 0; x < W; x += gridSize) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
    }
    for (let y = 0; y < H; y += gridSize) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }

    // Title
    ctx.fillStyle = '#ff6666';
    ctx.font = 'bold 11px Courier New';
    ctx.fillText('BATTLEFIELD', 14, 20);

    const training = t >= 0.05 && t < 0.3;
    const deploying = t >= 0.35 && t < 0.9;

    rec.classList.toggle('on', training);

    // Enemy grid
    const gridStartX = W * 0.35;
    const gridStartY = 50;
    const cellW = Math.min(85, (W - gridStartX - 20) / COLS);
    const cellH = 55;

    let totalFixed = 0;
    const total = COLS * ROWS;

    // Calculate fixed count based on time
    if (deploying) {
      const dt = (t - 0.35) / 0.55;
      totalFixed = Math.min(total, Math.floor(dt * total * 1.3));
    } else if (t >= 0.9) {
      totalFixed = total;
    }

    // Draw enemies
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const idx = r * COLS + c;
        const ex = gridStartX + c * cellW + cellW / 2;
        const ey = gridStartY + r * cellH + cellH / 2;
        const fixed = idx < totalFixed || (training && idx === 0 && t > 0.2);
        drawEnemy(ex, ey, 28, fixed);

        // Hit effect
        if (deploying && idx === totalFixed - 1) {
          const flash = (now * 0.01) % 1;
          ctx.strokeStyle = `rgba(0,255,200,${0.6 * (1 - flash)})`;
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(ex, ey, 20 + flash * 15, 0, Math.PI * 2);
          ctx.stroke();
          ctx.lineWidth = 1;
        }
      }
    }

    // Training area (left side)
    const trainX = 30;
    const trainY = H * 0.35;

    if (training) {
      // Original trooper being trained
      ctx.fillStyle = '#ffcc00';
      ctx.font = '10px Courier New';
      ctx.fillText('TRAINING CLONE...', trainX, trainY - 30);

      const tp = (t - 0.05) / 0.25;
      drawTrooper(trainX + 40, trainY + 10, '#ffcc00', 20, 1);

      // Show command sequence being learned
      const cmds = ['c', 'w', 'c', 'o', 'n', 's', 't'];
      const learned = Math.min(cmds.length, Math.floor(tp * cmds.length));
      ctx.fillStyle = '#ffcc00';
      ctx.font = '11px Courier New';
      for (let i = 0; i < learned; i++) {
        ctx.fillText(cmds[i], trainX + 80 + i * 14, trainY + 14);
      }

      // Training ring
      ctx.strokeStyle = `rgba(255,204,0,${0.3 + 0.3 * Math.sin(now * 0.008)})`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(trainX + 40, trainY + 5, 30 + Math.sin(now * 0.005) * 5, 0, Math.PI * 2);
      ctx.stroke();
      ctx.lineWidth = 1;

      keys.textContent = 'qa cw const Esc q';
      keys.classList.add('on');
    }

    // Clone deployment
    if (deploying) {
      const dt = (t - 0.35) / 0.55;

      // Draw marching clones
      const numClones = Math.min(10, Math.floor(dt * 12));
      for (let i = 0; i < numClones; i++) {
        const cx = trainX + 20 + (i % 3) * 30;
        const cy = trainY - 20 + Math.floor(i / 3) * 35;
        const marchOffset = Math.sin(now * 0.006 + i) * 3;
        drawTrooper(cx, cy + marchOffset, '#00ffc8', 14, 1);
      }

      // Clone count label
      ctx.fillStyle = '#00ffc8';
      ctx.font = 'bold 10px Courier New';
      ctx.fillText('CLONES: ' + numClones, trainX, trainY + 80);

      // Movement lines from clones to enemies
      if (totalFixed > 0) {
        const targetIdx = Math.min(totalFixed, total) - 1;
        const tr = Math.floor(targetIdx / COLS);
        const tc = targetIdx % COLS;
        const tx = gridStartX + tc * cellW + cellW / 2;
        const ty = gridStartY + tr * cellH + cellH / 2;

        ctx.strokeStyle = 'rgba(0,255,200,0.15)';
        ctx.setLineDash([3, 5]);
        ctx.beginPath();
        ctx.moveTo(trainX + 60, trainY);
        ctx.lineTo(tx, ty);
        ctx.stroke();
        ctx.setLineDash([]);
      }

      keys.textContent = totalFixed < 10 ? '@a (clone deployed)' : '10@a (mass deploy!)';
      keys.classList.add('on');

      counter.textContent = 'Enemies fixed: ' + Math.min(totalFixed, total) + '/' + total;
      counter.classList.add('on');
    } else if (t < 0.35) {
      counter.classList.remove('on');
    }

    if (!training && !deploying) {
      keys.classList.remove('on');
    }

    // Victory
    if (t >= 0.9) {
      counter.textContent = 'Enemies fixed: ' + total + '/' + total;
      counter.classList.add('on');

      const vt = (t - 0.9) / 0.1;

      // Victory banner
      ctx.fillStyle = `rgba(0,255,200,${0.1 + 0.05 * Math.sin(now * 0.005)})`;
      ctx.fillRect(0, 0, W, H);

      ctx.fillStyle = '#00ffc8';
      ctx.font = 'bold 20px Courier New';
      ctx.textAlign = 'center';
      ctx.fillText('VICTORY', W / 2, H / 2 + 100);
      ctx.font = '12px Courier New';
      ctx.fillText('All code enemies defeated!', W / 2, H / 2 + 120);
      ctx.textAlign = 'left';

      // Firework particles
      for (let i = 0; i < 8; i++) {
        const angle = (i / 8) * Math.PI * 2 + now * 0.002;
        const radius = 30 + vt * 40;
        const px = W / 2 + Math.cos(angle) * radius;
        const py = H / 2 + 100 + Math.sin(angle) * radius * 0.4;
        ctx.fillStyle = i % 2 === 0 ? '#00ffc8' : '#ffcc00';
        ctx.beginPath();
        ctx.arc(px, py, 2, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // Caption
    for (const c of captions) {
      if (t >= c.start && t < c.end) {
        caption.innerHTML = c.text;
        break;
      }
    }

    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
})();

</script>
